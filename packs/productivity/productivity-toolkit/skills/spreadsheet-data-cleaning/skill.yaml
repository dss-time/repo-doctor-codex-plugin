id: productivity.spreadsheet-data-cleaning
name:
  en: Spreadsheet Data Cleaning
  zh-CN: 表格数据清洗
category: productivity
visibility: public
version: 0.1.0
status: beta
default_locale: zh-CN
supported_locales:
  - en
  - zh-CN
description:
  en: Profile, clean, standardize, transform, fill, or deduplicate spreadsheet or delimited data into an authorized new output with traceable rules, before/after statistics, an audit log, and validation of formulas, encoding, dimensions, and key summaries. Do not overwrite source data, guess critical values, or delete plausible records, and degrade to a cleaning plan when execution tools are unavailable. Use excel-data-quality-check-basic instead when the user requests only a read-only data-quality audit or issue report without changes or a cleaned copy.
  zh-CN: 对电子表格或分隔数据进行画像、清洗、标准化、转换、填补或去重，并在用户授权下生成新结果，提供可追踪规则、前后统计、审计日志及公式、编码、行列数和关键汇总验证。不得覆盖原始数据、猜测关键值或删除可能有效的记录；缺少执行工具时降级为清洗计划。用户只要求只读数据质量审计或问题报告，不要求修改或清洗副本时，应使用 excel-data-quality-check-basic。
triggers:
  en:
    - clean this spreadsheet
    - normalize this CSV safely
    - profile and deduplicate this table
  zh-CN:
    - 清洗这份表格
    - 安全规范化这个 CSV
    - 对表格画像并去重
tool_requirements:
  filesystem: write
  git: none
  shell: optional
  web: none
permissions:
  read_files: true
  write_files: true
  run_shell_commands: true
  access_network: false
  destructive_actions_allowed: false
risk_level:
  default: safe_edit
output_schema:
  type: spreadsheet_cleaning_result
localization:
  en:
    status: complete
  zh-CN:
    status: complete
