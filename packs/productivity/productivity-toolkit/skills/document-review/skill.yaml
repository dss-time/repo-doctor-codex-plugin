id: productivity.document-review
name:
  en: Document Review
  zh-CN: 文档审查
category: productivity
visibility: public
version: 0.1.0
status: beta
default_locale: zh-CN
supported_locales:
  - en
  - zh-CN
description:
  en: Default to this Skill for an unqualified document or Word review and for holistic checks of structure, logic, completeness, terminology, factual support, figures, citations, grammar, formatting, tables, links, comments, tracked changes, or authorized revisions. When DOCX or rendering tools are unavailable, degrade within this Skill and state the limitation. Use content-consistency-check for cross-document reconciliation, and do not use when the user explicitly requests word-document-review-basic or a lightweight, read-only, text-and-headings-only Word check without complex formatting or revisions.
  zh-CN: 未限定范围的通用文档或 Word 审查，以及结构、逻辑、完整性、术语、事实依据、数字、引用、语法、格式、表格、链接、批注、修订痕迹或获授权修订等整体检查，默认使用本 Skill。DOCX 或渲染工具不可用时仍在本 Skill 内降级并说明限制。跨文档核对应使用 content-consistency-check；用户明确指定 word-document-review-basic，或明确要求轻量、只读、只检查文字和标题且不处理复杂格式或修订时不使用本 Skill。
triggers:
  en:
    - review this document
    - review this Word document
    - critique this draft
    - edit this document with tracked issues
  zh-CN:
    - 审查这份文档
    - 审查这个 Word 文档
    - 评审这个草稿
    - 按问题清单修改文档
tool_requirements:
  filesystem: write
  git: none
  shell: optional
  web: optional
permissions:
  read_files: true
  write_files: true
  run_shell_commands: true
  access_network: true
  destructive_actions_allowed: false
risk_level:
  default: safe_edit
output_schema:
  type: document_review
localization:
  en:
    status: complete
  zh-CN:
    status: complete
