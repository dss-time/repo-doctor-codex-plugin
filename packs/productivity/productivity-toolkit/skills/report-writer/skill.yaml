id: productivity.report-writer
name:
  en: Report Writer
  zh-CN: 报告撰写
category: productivity
visibility: public
version: 0.2.0
status: beta
default_locale: zh-CN
supported_locales:
  - en
  - zh-CN
description:
  en: Draft or revise a structured report from user-provided goals, audience, evidence, and format, separating facts, quotations, inferences, recommendations, and unknowns. Use when the deliverable is a report; use research-brief when the main task is gathering and synthesizing evidence, and do not invent missing facts or claim DOCX/PDF generation without available tools and explicit authorization.
  zh-CN: 根据用户提供的目标、读者、证据和格式撰写或修订结构化报告，并区分事实、引用、推断、建议和未知项。交付物是报告时使用；主要任务是搜集和综合证据时使用 research-brief；不得补造事实，也不得在缺少工具或未获明确授权时声称生成 DOCX/PDF。
triggers:
  en:
    - write a structured report
    - turn these materials into a report
    - revise this report
  zh-CN:
    - 撰写结构化报告
    - 把这些材料整理成报告
    - 修订这份报告
tool_requirements:
  filesystem: write
  git: none
  shell: optional
  web: optional
permissions:
  read_files: true
  write_files: true
  run_shell_commands: true
  access_network: true
  destructive_actions_allowed: false
risk_level:
  default: safe_edit
output_schema:
  type: structured_report
localization:
  en:
    status: complete
  zh-CN:
    status: complete
