id: productivity.content-consistency-check
name:
  en: Content Consistency Check
  zh-CN: 内容一致性检查
category: productivity
visibility: public
version: 0.1.0
status: beta
default_locale: zh-CN
supported_locales:
  - en
  - zh-CN
description:
  en: Compare one or more artifacts for conflicting terminology, figures, dates, units, people, versions, links, and conclusions, reporting both locations, severity, conflict type, and a recommended authority. Use when reconciliation across content is primary; use document-review for holistic quality of one document, and do not select a correct value without authoritative evidence or claim unsupported file-format checks.
  zh-CN: 对一个或多个材料中的术语、数字、日期、单位、人物、版本、链接和结论进行对照，报告冲突两侧位置、严重度、类型和建议权威基准。主要任务是跨内容核对时使用；单份文档整体质量应使用 document-review；没有权威证据时不得擅选正确值，也不得声称完成不受支持的文件格式检查。
triggers:
  en:
    - check these documents for consistency
    - reconcile figures across these files
    - find conflicting terms dates and conclusions
  zh-CN:
    - 检查这些文档的一致性
    - 核对多个文件中的数字
    - 查找术语日期和结论冲突
tool_requirements:
  filesystem: read
  git: none
  shell: optional
  web: optional
permissions:
  read_files: true
  write_files: false
  run_shell_commands: true
  access_network: true
  destructive_actions_allowed: false
risk_level:
  default: tool_execution
output_schema:
  type: content_consistency_report
localization:
  en:
    status: complete
  zh-CN:
    status: complete
