id: office.excel-data-quality-check-basic
name:
  en: Basic Excel Data Quality Check
  zh-CN: Excel 数据质量基础检查
category: office
visibility: public
version: 0.1.0
status: beta
default_locale: zh-CN
supported_locales:
  - en
  - zh-CN
description:
  en: Perform a read-only spreadsheet data-quality audit that reports missing values, duplicates, types, formats, anomalies, and source-traceability issues without cleaning, standardizing, filling, deduplicating, overwriting, or generating a modified copy. Use for requests to check, audit, or list data-quality problems; use spreadsheet-data-cleaning when the user requests transformations, fixes, or a cleaned output.
  zh-CN: 对表格执行只读数据质量审计，报告缺失、重复、类型、格式、异常和来源可追溯性问题，不清洗、标准化、填补、去重、覆盖或生成修改后的副本。用于检查、审计或列出数据质量问题；用户要求转换、修复或输出清洗结果时使用 spreadsheet-data-cleaning。
triggers:
  en:
    - audit spreadsheet data quality without changes
    - check Excel for missing duplicates and format issues
    - report spreadsheet anomalies read only
  zh-CN:
    - 只读检查 Excel 数据质量
    - 检查表格缺失重复和格式问题
    - 审计表格异常但不修改
tool_requirements:
  filesystem: read
  git: none
  shell: optional
  web: none
permissions:
  read_files: true
  write_files: false
  run_shell_commands: false
  access_network: false
  destructive_actions_allowed: false
risk_level:
  default: read_only
output_schema:
  type: data_quality_report
localization:
  en:
    status: complete
  zh-CN:
    status: complete
