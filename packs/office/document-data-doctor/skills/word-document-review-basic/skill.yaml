id: office.word-document-review-basic
name:
  en: Basic Word Document Review
  zh-CN: Word 文档基础审查
category: office
visibility: public
version: 0.1.0
status: beta
default_locale: zh-CN
supported_locales:
  - en
  - zh-CN
description:
  en: Perform a lightweight, read-only, text-only Word check only when the user explicitly limits the task to wording, heading hierarchy, simple grammar, obvious consistency, and unresolved placeholders without editing the source, preserving complex formatting, or handling tracked changes, comments, complex tables, images, headers, footers, or visual layout. Do not use for an unqualified Word or document review; use document-review for holistic structure, logic, facts, revisions, formatting, tables, links, comments, or rendered DOCX verification.
  zh-CN: 仅在用户明确把任务限定为基础、轻量、只读、纯文本检查时，检查 Word 文档的文字、标题层级、简单语法、明显一致性和未解决占位符，不编辑源文件、不保留复杂格式，也不处理修订痕迹、批注、复杂表格、图片、页眉页脚或视觉版式。不得用于未限定范围的通用 Word 或文档审查；整体结构、逻辑、事实、修订、格式、表格、链接、批注或 DOCX 渲染验证应使用 document-review。
triggers:
  en:
    - basic text-only Word check
    - lightweight Word text review without tracked changes
    - check Word text and headings without editing
  zh-CN:
    - 基础 Word 文字检查
    - 只检查 Word 文字和标题
    - Word 轻量文本审查不修改文件
tool_requirements:
  filesystem: read
  git: none
  shell: optional
  web: none
permissions:
  read_files: true
  write_files: false
  run_shell_commands: false
  access_network: false
  destructive_actions_allowed: false
risk_level:
  default: read_only
output_schema:
  type: document_review_report
localization:
  en:
    status: complete
  zh-CN:
    status: complete
