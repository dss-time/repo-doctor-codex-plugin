id: office.pdf-review-basic
name:
  en: Basic PDF Review
  zh-CN: PDF 基础审查
category: office
visibility: public
version: 0.1.0
status: beta
default_locale: zh-CN
supported_locales:
  - en
  - zh-CN
description:
  en: Perform a lightweight, read-only, text-only PDF check only when the user explicitly limits the task to extractable text, headings, obvious textual issues, and a short issue list without OCR, rendering, scanned-content recognition, tables, images, complex layout, or source-file changes. Do not use for an unqualified PDF review; use pdf-review for generic requests, page or visual verification, OCR, scanned pages, tables, images, layout, or completeness. PDF modification or regeneration is outside both review Skills and requires a separately authorized editing workflow.
  zh-CN: 仅在用户明确把任务限定为基础、轻量、只读、纯文本检查时，检查 PDF 的可提取文字、标题和明显文本问题并给出简短清单，不做 OCR、页面渲染、扫描内容识别、表格、图片、复杂版式或源文件修改。不得用于未限定范围的通用 PDF 审查；通用请求、页码或视觉核验、OCR、扫描页、表格、图片、版式或完整性应使用 pdf-review。PDF 修改或重新生成不属于这两个审查 Skill，需要另行授权的编辑流程。
triggers:
  en:
    - lightweight text-only PDF check
    - basic PDF text review without OCR
    - review extractable PDF text without rendering
  zh-CN:
    - 基础 PDF 文字检查
    - 只检查 PDF 可提取文字
    - PDF 轻量文本审查不做 OCR 或渲染
tool_requirements:
  filesystem: read
  git: none
  shell: optional
  web: none
permissions:
  read_files: true
  write_files: false
  run_shell_commands: false
  access_network: false
  destructive_actions_allowed: false
risk_level:
  default: read_only
output_schema:
  type: document_review_report
localization:
  en:
    status: complete
  zh-CN:
    status: complete
