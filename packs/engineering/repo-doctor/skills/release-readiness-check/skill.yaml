id: repo.release-readiness-check
name:
  en: Release Readiness Check
  zh-CN: 发布就绪检查
category: engineering
visibility: public
version: 0.1.0
status: beta
default_locale: zh-CN
supported_locales:
  - en
  - zh-CN
description:
  en: Perform an evidence-backed, read-only release gate for a specific candidate version and return GO, GO WITH CONDITIONS, or NO-GO after checking workspace state, versioning, changes, validation, compatibility, rollback, documentation, and sensitive artifacts. Use for release candidates; do not use as a broad project health check or execute release, commit, tag, push, or version changes.
  zh-CN: 针对具体候选版本执行有证据的只读发布门禁，检查工作区、版本、变更、验证、兼容性、回滚、文档和敏感产物后给出 GO、GO WITH CONDITIONS 或 NO-GO。用于候选版本；不作为广泛项目体检，也不执行发布、提交、tag、push 或版本修改。
triggers:
  en:
    - check whether this release candidate is ready
    - run a release readiness gate
    - give a GO or NO-GO decision for this version
    - release readiness check
  zh-CN:
    - 检查这个候选版本是否可发布
    - 执行发布就绪门禁
    - 对这个版本给出 GO 或 NO-GO
    - 发布就绪检查
tool_requirements:
  filesystem: read
  git: optional
  shell: optional
  web: none
permissions:
  read_files: true
  write_files: false
  run_shell_commands: false
  access_network: false
  destructive_actions_allowed: false
risk_level:
  default: advisory
output_schema:
  type: release_readiness_report
localization:
  en:
    status: complete
  zh-CN:
    status: complete
