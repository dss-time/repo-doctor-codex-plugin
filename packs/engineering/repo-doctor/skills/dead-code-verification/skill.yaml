id: repo.dead-code-verification
name:
  en: Dead Code Verification
  zh-CN: 死代码验证
category: engineering
visibility: public
version: 0.1.0
status: beta
default_locale: zh-CN
supported_locales:
  - en
  - zh-CN
description:
  en: Verify whether a specific symbol, file, route, configuration path, or feature is safely removable by checking static and dynamic usage, registries, build entries, templates, plugins, scripts, and external contracts. Use for evidence of unused code; do not perform general impact analysis, assume absence from text search proves safety, or delete code.
  zh-CN: 通过检查静态与动态使用、注册器、构建入口、模板、插件、脚本和外部契约，验证具体符号、文件、路由、配置路径或功能是否可安全删除。用于无用代码证据；不替代通用影响分析，不把文本搜索无结果当安全证明，也不删除代码。
triggers:
  en: [verify whether this code is dead, prove this file is unused, dead code verification]
  zh-CN: [验证这段代码是否无用, 证明这个文件未使用, 死代码验证]
tool_requirements:
  filesystem: read
  git: optional
  shell: optional
  web: none
permissions:
  read_files: true
  write_files: false
  run_shell_commands: false
  access_network: false
  destructive_actions_allowed: false
risk_level: {default: read_only}
output_schema: {type: dead_code_verification_report}
localization:
  en: {status: complete}
  zh-CN: {status: complete}
