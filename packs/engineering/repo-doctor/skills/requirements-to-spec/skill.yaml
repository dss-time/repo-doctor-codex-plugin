id: repo.requirements-to-spec
name:
  en: Requirements to Spec
  zh-CN: 需求澄清与规格化
category: engineering
visibility: public
version: 0.1.0
status: beta
default_locale: zh-CN
supported_locales:
  - en
  - zh-CN
description:
  en: Convert an ambiguous or incomplete request into an implementable, testable specification by using repository evidence, explicit assumptions, scoped questions, flows, boundaries, and acceptance criteria. Use before impact analysis or implementation planning; do not use alone for complete specifications, code explanation, bug fixing, or direct edits.
  zh-CN: 将模糊、口语化或不完整的需求基于仓库证据整理为可实施、可验证的规格，明确假设、问题、流程、边界与验收标准。用于影响分析或实施计划之前；完整规格、代码解释、Bug 修复或直接修改请求不应单独使用。
triggers:
  en:
    - clarify this requirement
    - turn this request into a specification
    - define acceptance criteria
    - requirements to spec
  zh-CN:
    - 澄清这个需求
    - 把需求整理成规格
    - 补全验收标准
    - 需求澄清与规格化
tool_requirements:
  filesystem: read
  git: optional
  shell: optional
  web: none
permissions:
  read_files: true
  write_files: false
  run_shell_commands: false
  access_network: false
  destructive_actions_allowed: false
risk_level:
  default: read_only
output_schema:
  type: requirements_specification
localization:
  en:
    status: complete
  zh-CN:
    status: complete
