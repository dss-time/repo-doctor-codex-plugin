id: repo.change-impact-analysis
name:
  en: Change Impact Analysis
  zh-CN: 变更影响分析
category: engineering
visibility: public
version: 0.1.0
status: beta
default_locale: zh-CN
supported_locales:
  - en
  - zh-CN
description:
  en: Analyze general dependency and compatibility impact before modifying, renaming, moving, or deleting shared code. Use dependency-upgrade-analysis, api-contract-review, database-migration-review, or dead-code-verification when the core question is that specialized risk; do not modify files.
  zh-CN: 在修改、重命名、移动或删除共享代码前分析一般依赖关系和兼容性影响。核心问题是依赖升级、API 契约、数据库迁移或死代码可删除性时使用对应专项 Skill；本 Skill 不修改文件。
triggers:
  en:
    - what will this change affect
    - can I rename this
    - change impact analysis
  zh-CN:
    - 这个改动会影响什么
    - 可以重命名这个吗
    - 变更影响分析
tool_requirements:
  filesystem: read
  git: optional
  shell: optional
  web: none
permissions:
  read_files: true
  write_files: false
  run_shell_commands: false
  access_network: false
  destructive_actions_allowed: false
risk_level:
  default: read_only
output_schema:
  type: impact_analysis_report
localization:
  en:
    status: complete
  zh-CN:
    status: complete
