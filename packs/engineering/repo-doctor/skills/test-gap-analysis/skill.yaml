id: repo.test-gap-analysis
name:
  en: Test Gap Analysis
  zh-CN: 测试缺口分析
category: engineering
visibility: public
version: 0.1.0
status: beta
default_locale: zh-CN
supported_locales:
  - en
  - zh-CN
description:
  en: Map a requirement, root cause, existing tests, or Git diff to evidence-backed test coverage and prioritized gaps across unit, integration, contract, end-to-end, and manual validation. Use to decide what is covered or missing; do not generate bulk test code, and route explicit test implementation to safe-test-implementation when available.
  zh-CN: 将需求、根因、现有测试或 Git Diff 映射到有证据的测试覆盖与优先级缺口，覆盖单元、集成、契约、端到端和人工验证。用于判断已覆盖和缺失场景；不得批量生成测试代码，明确实施测试时交给可用的 safe-test-implementation。
triggers:
  en:
    - analyze test gaps for this change
    - what tests are missing
    - map this diff to existing tests
    - test gap analysis
  zh-CN:
    - 分析这个改动的测试缺口
    - 还缺哪些测试
    - 把这个 diff 映射到现有测试
    - 测试缺口分析
tool_requirements:
  filesystem: read
  git: optional
  shell: optional
  web: none
permissions:
  read_files: true
  write_files: false
  run_shell_commands: false
  access_network: false
  destructive_actions_allowed: false
risk_level:
  default: read_only
output_schema:
  type: test_gap_report
localization:
  en:
    status: complete
  zh-CN:
    status: complete
