id: repo.ci-failure-diagnosis
name:
  en: CI Failure Diagnosis
  zh-CN: CI 失败诊断
category: engineering
visibility: public
version: 0.1.0
status: beta
default_locale: zh-CN
supported_locales:
  - en
  - zh-CN
description:
  en: Diagnose a CI-specific failure from workflow definitions and logs by locating the failed workflow, job, step, and first trustworthy error, then comparing CI and local environments. Use for CI pipeline context; do not use as a general local bug analysis or implement fixes, reveal credential values, or recommend weakening security controls.
  zh-CN: 根据 workflow 定义和日志定位失败的 workflow、job、step 与第一个可信错误，并对比 CI 和本地环境以诊断 CI 特定失败。用于 CI 流水线上下文；不作为普通本地 Bug 分析，不实施修复、不泄露密钥，也不建议降低安全控制。
triggers:
  en:
    - diagnose this CI failure
    - find the first real error in this workflow run
    - why does this pass locally but fail in CI
    - CI failure diagnosis
  zh-CN:
    - 诊断这个 CI 失败
    - 找出 workflow 运行中的第一个真实错误
    - 为什么本地通过但 CI 失败
    - CI 失败诊断
tool_requirements:
  filesystem: read
  git: optional
  shell: optional
  web: none
permissions:
  read_files: true
  write_files: false
  run_shell_commands: false
  access_network: false
  destructive_actions_allowed: false
risk_level:
  default: read_only
output_schema:
  type: ci_failure_report
localization:
  en:
    status: complete
  zh-CN:
    status: complete
