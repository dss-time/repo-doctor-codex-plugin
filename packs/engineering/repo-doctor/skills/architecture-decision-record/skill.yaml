id: repo.architecture-decision-record
name:
  en: Architecture Decision Record
  zh-CN: 架构决策记录
category: engineering
visibility: public
version: 0.1.0
status: beta
default_locale: zh-CN
supported_locales:
  - en
  - zh-CN
description:
  en: Create or update an ADR from a real architectural problem, evidence, alternatives, tradeoffs, and an explicit decision state while respecting the repository's ADR location, numbering, and template. Use only when the user authorizes ADR or architecture-document edits; do not generate an implementation plan, fabricate team consensus, or modify business code.
  zh-CN: 根据真实架构问题、证据、候选方案、权衡和明确决策状态创建或更新 ADR，并遵循仓库 ADR 目录、编号和模板。仅在用户授权修改 ADR 或架构文档时使用；不生成实施计划、不虚构团队共识，也不修改业务代码。
triggers:
  en: [create an architecture decision record, update this ADR, document this architecture decision]
  zh-CN: [创建架构决策记录, 更新这个 ADR, 记录这个架构决策]
tool_requirements:
  filesystem: write
  git: optional
  shell: none
  web: optional
permissions:
  read_files: true
  write_files: true
  run_shell_commands: false
  access_network: false
  destructive_actions_allowed: false
risk_level: {default: safe_edit}
output_schema: {type: architecture_decision_record}
localization:
  en: {status: complete}
  zh-CN: {status: complete}
